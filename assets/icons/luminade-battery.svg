<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">LuminaDE Battery Icon</title>
  <desc id="desc">Battery status glyph with charge level.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#081520"/><stop offset="100%" stop-color="#173a50"/></linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5ce4ff"/><stop offset="100%" stop-color="#7fffd0"/></linearGradient>
  </defs>
  <rect x="20" y="20" width="216" height="216" rx="44" fill="url(#bg)"/>
  <rect x="54" y="88" width="138" height="80" rx="16" fill="none" stroke="url(#ac)" stroke-width="10"/>
  <rect x="192" y="112" width="16" height="32" rx="8" fill="url(#ac)"/>
  <rect x="66" y="100" width="92" height="56" rx="10" fill="url(#ac)"/>
</svg>
