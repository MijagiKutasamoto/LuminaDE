<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">LuminaDE Settings Icon</title>
  <desc id="desc">Rounded settings tile with refined gear silhouette.</desc>
  <defs>
    <linearGradient id="settingsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="100%" stop-color="#1a3a50"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5fe6ff"/>
      <stop offset="100%" stop-color="#83ffd4"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="216" height="216" rx="44" fill="url(#settingsBg)"/>
  <g transform="translate(128 128)">
    <circle r="36" fill="none" stroke="url(#gear)" stroke-width="12"/>
    <circle r="13" fill="url(#gear)"/>
    <rect x="-7" y="-70" width="14" height="20" rx="7" fill="url(#gear)"/>
    <rect x="-7" y="50" width="14" height="20" rx="7" fill="url(#gear)"/>
    <rect x="50" y="-7" width="20" height="14" rx="7" fill="url(#gear)"/>
    <rect x="-70" y="-7" width="20" height="14" rx="7" fill="url(#gear)"/>
    <rect x="-57" y="-52" width="18" height="12" rx="6" transform="rotate(-45)" fill="url(#gear)"/>
    <rect x="39" y="40" width="18" height="12" rx="6" transform="rotate(-45)" fill="url(#gear)"/>
    <rect x="-57" y="40" width="18" height="12" rx="6" transform="rotate(45)" fill="url(#gear)"/>
    <rect x="39" y="-52" width="18" height="12" rx="6" transform="rotate(45)" fill="url(#gear)"/>
  </g>
</svg>
