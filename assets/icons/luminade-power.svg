  <rect x="20" y="20" width="216" height="216" rx="44" fill="url(#bg)"/>
  <circle cx="128" cy="134" r="62" fill="none" stroke="url(#ac)" stroke-width="14" stroke-linecap="round" stroke-dasharray="320 84" transform="rotate(-44 128 134)"/>
  <rect x="121" y="54" width="14" height="74" rx="7" fill="url(#ac)"/>
